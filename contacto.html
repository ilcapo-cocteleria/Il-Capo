<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Il Capo - Contacto de Contrabando</title>
    <!-- Vinculamos tu CSS principal -->
    <link rel="stylesheet" href="main.css">
    
    <style>
        /* Estilos específicos para el formulario de contacto */
        .formulario-contacto {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 30px;
            text-align: left;
        }

        .grupo-input {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .grupo-input label {
            color: #ebc105; /* Dorado Il Capo */
            font-family: 'ModernRomance', sans-serif;
            font-size: 16px;
            letter-spacing: 1px;
        }

        .grupo-input input, 
        .grupo-input textarea {
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 12px 15px;
            color: #ffffff;
            font-family: monospace;
            font-size: 15px;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
            outline: none;
        }

        /* Enfoque interactivo de los campos */
        .grupo-input input:focus, 
        .grupo-input textarea:focus {
            border-color: #ebc105;
            box-shadow: 0 0 10px rgba(235, 193, 5, 0.3);
        }

        /* Botón de envío Premium */
        .btn-enviar {
            background-color: #ebc105;
            color: #000000;
            border: none;
            border-radius: 8px;
            padding: 15px;
            font-family: 'PerfectGirl', monospace;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.3s ease, background-color 0.3s ease, box-shadow 0.3s ease;
            margin-top: 10px;
        }

        .btn-enviar:hover {
            background-color: #ffffff;
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(255, 255, 255, 0.2);
        }

        .btn-enviar:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body style="background-color:  rgb(71, 8, 8)"> <!-- Mantiene el fondo rojo característico -->

    <!-- Loader de pantalla (Mismo sistema de main y coctelera) -->
    <div id="loader-wrapper">
        <div class="spinner"></div>
    </div>

    <center id="contenido-pagina" style="padding-top: 40px; padding-bottom: 60px;">
        
        <!-- ==========================================================================
           BARRA DE NAVEGACIÓN (El borde amarillo ahora resalta "Contacto")
           ========================================================================== -->
        <div class="bloque visible" style="background-color: rgba(71, 8, 8, 0.8); color: #ffffff; padding: 20px 40px;">
            <a href="main.html" style="color: #ebc105; font-family: 'ModernRomance', sans-serif; text-decoration: none; font-size: 20px;">Inicio</a>
            <a href="contacto.html" style="color: #ebc105; font-family: 'ModernRomance', sans-serif; text-decoration: none; font-size: 20px; margin-left: 20px; border-bottom: 1px solid #ebc105;">Contacto</a>
            <a href="coctelera.html" style="color: #ebc105; font-family: 'ModernRomance', sans-serif; text-decoration: none; font-size: 20px; margin-left: 20px;">Nuestra Coctelera</a>
        </div>

        <!-- ==========================================================================
           BLOQUE OSCURO DE CONTACTO (Sin bordes amarillos)
           ========================================================================== -->
        <div class="bloque visible" style="background-color: rgba(71, 8, 8, 0.8); color: #ffffff;">
            
            <!-- Reutilizamos la clase del logo grande controlado -->
            <img class="logo-coctelera" src="logo.png" alt="Logo Il Capo">
            
            <h1 style="color: #ebc105; margin-top: 20px; margin-bottom: 10px;">MENSAJE EN CLAVE</h1>
            <p class="texto" style="font-size: 20px; color: rgb(235, 193, 5); max-width: 80%; margin: 0 auto 20px auto;">
                ¿Quieres reservar el reservado de la trastienda o cerrar un trato privado? Déjanos tus datos. Cuidamos la discreción.
            </p>

            <!-- Formulario Estilizado -->
            <form class="formulario-contacto" action="#" method="POST">
                
                <div class="grupo-input">
                    <label for="nombre">Nombre o Alias</label>
                    <input type="text" id="nombre" name="nombre" placeholder="Ej. Don Salieri" required>
                </div>

                <div class="grupo-input">
                    <label for="email">Canal de Contacto (Email)</label>
                    <input type="email" id="email" name="email" placeholder="tu-correo@seguro.com" required>
                </div>

                <div class="grupo-input">
                    <label for="asunto">Asunto del Negocio</label>
                    <input type="text" id="asunto" name="asunto" placeholder="Reservas, eventos privados, quejas..." required>
                </div>

                <div class="grupo-input">
                    <label for="mensaje">Tu Mensaje</label>
                    <textarea id="mensaje" name="mensaje" rows="5" placeholder="Escribe tu mensaje con el máximo detalle..." required></textarea>
                </div>

                <button type="submit" class="btn-enviar">ENVIAR AL CAPO</button>
            </form>

        </div>

    </center>

    <!-- Script para remover el Loader al cargar -->
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                const loader = document.getElementById('loader-wrapper');
                if (loader) {
                    loader.classList.add('fade-out');
                }
            }, 1200); // Carga rápida y elegante
        });
    </script>

</body>
</html>
