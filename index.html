  <!DOCTYPE html>
    <html lang="en">
        <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <link rel="stylesheet" href="index.css" />
        <title>Acceso</title>
        </head>
        <body style="background-color:#151515">
        <div class="interface-container">
    <div class="login-box">
        <h2 style="color: #ffffff; font-family:monospace">INICIAR SESIÓN</h2>
        <form id="formulario-login">
            <div class="input-group">
                <label style="color: #ffffff; font-family:monospace" for="username">Nombre</label>
                <input type="text" id="username" placeholder="Tu nombre...">
            </div>
            
            <div class="input-group">
                <label style="color: #ffffff; font-family:monospace" for="password">Contraseña</label>
                <input type="password" id="password" placeholder="Tu contraseña...">
            </div>
            
            <button style="font-family:monospace" type="submit">Ingresar</button>
            <p id="mensaje-error" style="color: #ff4a4a; font-family: monospace; display: none; margin-top: 10px; text-align: center;">
    Usuario o contraseña incorrectos.
    <script src="script.js"></script>
</p>
        </form>
    </div>
</div>
        </body>
