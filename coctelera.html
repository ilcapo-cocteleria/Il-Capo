<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="main.css?v=6.0">
    <title>Il Capo - Nuestra Coctelera</title>
    
    <script src="main.js" defer></script>

    <script>
        setTimeout(() => {
            const loader = document.getElementById('loader-wrapper');
            const contenido = document.getElementById('contenido-pagina');
            if (loader && !loader.classList.contains('fade-out')) {
                loader.classList.add('fade-out');
                if (contenido) contenido.style.display = 'block';
                console.log("Desbloqueo de emergencia activado con éxito.");
            }
        }, 2500); // 2.5 segundos (margen de seguridad)

        // Lógica de la Vista Previa en Grande
        document.addEventListener("DOMContentLoaded", () => {
            const modal = document.getElementById('preview-modal');
            const imagenMayor = document.getElementById('imagen-mayor');
            const botonCerrar = document.getElementById('cerrar-preview');
            const fotosCoctel = document.querySelectorAll('img.foto-coctel-lista');

            // Abrir el preview al pulsar cualquier foto
            fotosCoctel.forEach(foto => {
                foto.addEventListener('click', () => {
                    imagenMayor.src = foto.src; // Copia la ruta de la foto clickeada
                    modal.style.display = 'flex';
                    setTimeout(() => {
                        modal.style.opacity = '1';
                        imagenMayor.style.transform = 'scale(1)'; // Efecto suave de crecimiento
                    }, 10);
                });
            });

            // Función para cerrar el preview de contrabando
            const cerrarModal = () => {
                modal.style.opacity = '0';
                imagenMayor.style.transform = 'scale(0.7)';
                setTimeout(() => {
                    modal.style.display = 'none';
                }, 300); // Espera a que termine la animación
            };

            // Cerrar al pulsar la 'X', al hacer clic fuera de la foto, o con la tecla Escape
            botonCerrar.addEventListener('click', cerrarModal);
            modal.addEventListener('click', (e) => {
                if (e.target !== imagenMayor) cerrarModal();
            });
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && modal.style.display === 'flex') cerrarModal();
            });
        });
    </script>

    <style>
        /* === ESTILOS PARA ORDENADOR (VISTA ESCRITORIO) === */
        .item-coctel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 50px; 
            margin-bottom: 50px; 
            text-align: left;
        }

        /* Invierte el orden en las filas PARES (2, 4, 6, 8, 10) en PC */
        .item-coctel:nth-of-type(even) {
            flex-direction: row-reverse;
            text-align: right; 
        }

        .info-coctel {
            flex: 1;
        }

        /* CONTROL DE TAMAÑO PARA PC: Grande y vistoso */
        img.foto-coctel-lista {
            width: 320px !important;  
            height: 320px !important; 
            object-fit: contain !important; 
            border-radius: 12px !important;
            padding: 15px; 
            box-sizing: border-box;
            margin: 0 !important;
            flex-shrink: 0; 
            transition: transform 0.4s ease, box-shadow 0.4s ease;
        }

        img.foto-coctel-lista:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(235, 193, 5, 0.5);
            border-color: #ffffff !important;
        }

        /* === ADAPTACIÓN RADICAL SÓLO PARA MÓVILES === */
        @media (max-width: 768px) {
            .item-coctel, .item-coctel:nth-of-type(even) {
                flex-direction: column !important; /* Apila la foto abajo del texto de forma obligatoria */
                text-align: center !important;     /* Centra los textos de todos los cócteles */
                gap: 20px !important;
                margin-bottom: 40px !important;
            }

                width: 100% !important;
                max-width:
